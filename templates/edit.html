<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar ficha</title>
    <link rel="stylesheet" href="/static/CSS/style.css">
</head>
<body>
        <form action="/edit/{{ficha[0]}}" method="post">
            <input type="number" name="id_estudiante" id="id_estudiante" placeholder="ID de estudiante" required value="{{ficha[1]}}">

            <select name="grado" id="grado">
                <option  value="4°" {% if ficha[2] == '4°' %}selected{% endif %}>4°</option>
                <option  value="5°" {% if ficha[2] == '5°' %}selected{% endif %}>5°</option>
                <option  value="6°" {% if ficha[2] == '6°' %}selected{% endif %}>6°</option>
            </select>

            <select name="tecnica" id="tecnica" >
                <option value="Desarrollo y Administracion de Aplicaciones Informaticas"  {% if ficha[3] == 'Desarrollo y Administracion de Aplicaciones Informaticas' %}selected{% endif %}>Desarrollo y Administracion de Aplicaciones Informaticas</option>
                <option  value="Gestion Administrativa y Tributaria" {% if ficha[3] == 'Gestion Administrativa y Tributaria' %}selected{% endif %}>Gestion Administrativa y Tributaria</option>
                <option  value="Comercio y Mercadeo" {% if ficha[3] == 'Comercio y Mercadeo' %}selected{% endif %}>Comercio y Mercadeo</option>
                <option  value="Servicios Gastronomicos" {% if ficha[3] == 'Servicios Gastronomicos' %}selected{% endif %}>Servicios Gastronomicos</option>
                <option  value="Electronica" {% if ficha[3] == 'Electronica' %}selected{% endif %}>Electronica</option>
                <option  value="Electricidad" {% if ficha[3] == 'Electricidad' %}selected{% endif %}>Electricidad</option>
                <option  value="Refrigeracion y Acondicionamiento de aires" {% if ficha[3] == 'Refrigeracion y Acondicionamiento de aires' %}selected{% endif %}>Refrigeracion y Acondicionamiento de aires</option>
            </select>

        <input type="date" id="fecha" name="fecha" placeholder="Fecha" required value="{{ficha[5]}}">

            <textarea name="descripcion" id="descripcion" placeholder="Descripción" required>{{ficha[4]}}</textarea>
            
            <input type="submit" value="Actualizar">
        </form>

</body>
</html>
